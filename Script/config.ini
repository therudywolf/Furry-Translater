[Settings]
; Режим работы (1 = обычный, 2 = только словарь, 3 = только фонетика)
Mode=1

; Интенсивность трансформации (1-10)
; Влияет на применение фонетических правил и количество фразочек
Intensity=5

; Автоматическое применение фонетики (true/false)
AutoPhonetics=true

; Добавление фразочек (true/false)
AddPhrases=true

; Вероятность добавления фразочек (0.0-1.0)
PhraseProbability=0.6

[Hotkeys]
; Горячая клавиша для трансформации (^ = Ctrl, + = Shift, ! = Alt)
Transform=^+u

; Горячая клавиша для изменения интенсивности
Intensity=^+i

; Горячая клавиша для паузы/возобновления
Pause=^+p

; Горячая клавиша для справки
Help=^+h

[Blacklist]
; Добавьте названия программ, где НЕ нужна трансформация
; Разделяйте запятыми
Apps=passwords,KeePass,cmd,powershell,terminal,WindowsTerminal,Code.exe

[Advanced]
; Задержка перед вставкой текста (мс)
InsertDelay=100

; Задержка перед копированием (мс)
CopyDelay=50
